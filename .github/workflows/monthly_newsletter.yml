name: Monthly Newsletter Pipeline

on:
  schedule:
    - cron: '0 8 1 * *'   # 8:00 AM UTC on the 1st of every month
  workflow_dispatch:        # allow manual trigger from GitHub UI
    inputs:
      month:
        description: 'Reference month (YYYY-MM). Leave blank for previous month.'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine reference month
        id: month
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            echo "value=${{ github.event.inputs.month }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(python -c "from datetime import date; from dateutil.relativedelta import relativedelta; print((date.today().replace(day=1) - relativedelta(months=1)).strftime('%Y-%m'))")" >> $GITHUB_OUTPUT
          fi

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWSLETTER_MONTH: ${{ steps.month.outputs.value }}
        run: python main.py run --month $NEWSLETTER_MONTH

      - name: Move newsletter to tracked folder
        run: |
          mkdir -p newsletters
          MONTH=${{ steps.month.outputs.value }}
          SLUG=${MONTH//-/_}
          mv newsletter_${SLUG}.html newsletters/ 2>/dev/null || true

      - name: Commit and push newsletter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletters/
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "Newsletter ${{ steps.month.outputs.value }} [automated]" && git push
